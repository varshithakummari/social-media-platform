{% extends 'social/base.html' %}
{% block content %}
<div class="auth-card">
    <h2>Account Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="primary-btn">Sign In</button>
    </form>
    <p>Need an account? <a href="{% url 'register' %}">Register here</a></p>
</div>
{% endblock %}
